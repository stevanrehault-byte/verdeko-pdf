<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Verdeko — Dossier de pose</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap');
:root{
  --green-700:#2e5c33; --green-600:#3d7a3d; --green-500:#509350; --green-400:#6aac6a;
  --green-100:#eaf4ea; --green-50:#f3f8f3; --action:#3A8349;
  --mark:#c4e6c6;
  --ink:#23272a; --muted:#6b7770; --line:#e8e4da; --line-2:#efeae0;
  --paper:#faf8f3; --paper-2:#f4f1ea; --card:#ffffff;
  --slate:#2F5C69; --slate-d:#23454f;
  --gold:#c9a227; --gold-d:#a87b14; --amber-bg:#fdf6e7; --amber-bd:#ecd9a6;
  --danger:#c0492f; --danger-bg:#fcf0ed; --danger-bd:#f0d4cc;
  --sh-sm:0 1px 2px rgba(28,42,33,.04),0 6px 18px rgba(28,42,33,.05);
  --sh-md:0 2px 6px rgba(28,42,33,.06),0 18px 40px rgba(28,42,33,.10);
  --font:'Proxima Nova','Montserrat',ui-sans-serif,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
html{-webkit-print-color-adjust:exact;print-color-adjust:exact}
body{font-family:var(--font);color:var(--ink);line-height:1.5;-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility}
svg.ic{stroke:currentColor;fill:none;stroke-width:1.9;stroke-linecap:round;stroke-linejoin:round;flex:none;display:block}
.hl-mark{background:linear-gradient(transparent 55%, var(--mark) 55% 94%, transparent 94%);padding:0 .07em}

/* ===== PAGE A4 PAYSAGE ===== */
@page{size:A4 landscape;margin:0}
.page{width:297mm;height:210mm;background:var(--paper);position:relative;overflow:hidden;display:flex;flex-direction:column}
@media screen{ body{background:#5b6660;padding:26px 0} .page{margin:0 auto 26px;box-shadow:0 12px 46px rgba(0,0,0,.34);border-radius:2px} }
@media print{ .page{box-shadow:none;margin:0;border-radius:0;page-break-after:always} .page:last-child{page-break-after:auto} }

/* ===== EN-TETE / PIED ===== */
.pg-head{display:flex;align-items:center;justify-content:space-between;padding:11mm 15mm 0}
.pg-head .hl{display:flex;align-items:center;gap:14px}
.pg-head .lg{height:28px;width:auto;display:block}
.pg-head .hsep{width:1px;height:19px;background:var(--line)}
.pg-head .ht{font-size:12.5px;font-weight:700;color:var(--slate-d);letter-spacing:.005em}
.pg-head .hr{display:flex;align-items:center;gap:12px}
.pg-head .dots{display:flex;gap:5px}
.pg-head .dots i{width:5px;height:5px;border-radius:50%;background:var(--line);display:block}
.pg-head .dots i.on{background:var(--green-500);width:15px;border-radius:3px}
.pg-head .pn{font-size:12px;font-weight:700;color:var(--muted);letter-spacing:.05em}
.pg-head .pn b{color:var(--slate-d)}
.pg-rule{height:1px;background:var(--line);margin:9px 15mm 0}
.pg-body{flex:1;padding:7mm 15mm 0;display:flex;flex-direction:column;min-height:0;overflow:hidden}
.pg-foot{display:flex;align-items:flex-end;justify-content:space-between;padding:0 15mm 10mm;margin-top:auto}
.pg-foot .fl{font-size:11.5px;color:var(--muted);letter-spacing:.005em}
.pg-foot .fl .fg{color:var(--green-700);font-weight:700}
.pg-foot .fr{font-size:11px;color:var(--muted);font-weight:600}

/* eyebrow + titres */
.eyebrow{font-size:11px;font-weight:700;letter-spacing:.15em;text-transform:uppercase;color:var(--gold-d);display:flex;align-items:center;gap:9px}
.eyebrow::before{content:"";width:22px;height:2px;background:var(--gold);border-radius:2px}
.h-sec{font-size:27px;font-weight:700;color:var(--slate-d);letter-spacing:-.012em;margin-top:7px;line-height:1.1}
.lead{font-size:13.5px;color:var(--muted);margin-top:7px;max-width:610px;line-height:1.55}
.lead b{color:var(--ink)}

/* cartes */
.card{background:var(--card);border:1px solid var(--line);border-radius:18px;box-shadow:var(--sh-sm)}
.card-pad{padding:20px 23px}
.card-h{display:flex;align-items:center;gap:11px;margin-bottom:15px}
.card-h .ci{width:32px;height:32px;border-radius:10px;background:var(--green-50);display:flex;align-items:center;justify-content:center}
.card-h .ci svg{width:17px;height:17px;stroke:var(--green-600)}
.card-h h3{font-size:15px;font-weight:700;color:var(--ink)}
.card-h .meta{margin-left:auto;font-size:12px;font-weight:700;color:var(--slate)}

/* grilles */
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:18px}
.grid-3{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}
.grid-4{display:grid;grid-template-columns:repeat(4,1fr);gap:14px}

/* check rond plein (style home) */
.ckf{width:22px;height:22px;border-radius:50%;background:var(--green-500);display:inline-flex;align-items:center;justify-content:center;flex:none}
.ckf svg{width:12px;height:12px;stroke:#fff;fill:none;stroke-width:2.6;stroke-linecap:round;stroke-linejoin:round}

/* etapes numerotees */
.steps{display:grid;gap:16px}
.step{display:flex;gap:15px;align-items:flex-start}
.step .nb{width:34px;height:34px;border-radius:50%;background:#fff;border:1.5px solid var(--green-500);color:var(--green-600);font-size:15px;font-weight:700;display:flex;align-items:center;justify-content:center;flex:none;box-shadow:0 0 0 5px var(--green-50)}
.step .st-b{padding-top:2px}
.step .st-b .t{font-size:14px;font-weight:700;color:var(--ink);margin-bottom:3px}
.step .st-b .d{font-size:12.5px;color:var(--muted);line-height:1.55}
.step .st-b .d b{color:var(--ink);font-weight:700}

/* callouts */
.callout{display:flex;gap:13px;align-items:flex-start;border-radius:14px;padding:15px 18px;border:1px solid}
.callout svg{width:19px;height:19px;flex:none;margin-top:1px}
.callout .ct{font-size:12.5px;line-height:1.55}
.callout .ct b{font-weight:700}
.callout.warn{background:var(--amber-bg);border-color:var(--amber-bd);color:#6e560f}.callout.warn svg{stroke:var(--gold-d)}.callout.warn .ct b{color:var(--gold-d)}
.callout.info{background:var(--green-50);border-color:var(--green-100);color:#33503a}.callout.info svg{stroke:var(--green-600)}.callout.info .ct b{color:var(--green-700)}
.callout.danger{background:var(--danger-bg);border-color:var(--danger-bd);color:#7a2e1d}.callout.danger svg{stroke:var(--danger)}.callout.danger .ct b{color:var(--danger)}

/* stat tiles */
.stat{background:#fff;border:1px solid var(--line);border-radius:14px;padding:16px 8px;text-align:center;box-shadow:var(--sh-sm)}
.stat .v{font-size:21px;font-weight:700;color:var(--slate)}
.stat .v .u{font-size:12px;font-weight:700;color:var(--muted)}
.stat .l{font-size:9.5px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--muted);margin-top:4px}

/* listes check / icones */
.checks{display:grid;gap:12px}
.chk{display:flex;align-items:center;gap:12px;font-size:13px;color:var(--ink);line-height:1.4}
.chk>svg.ic{width:18px;height:18px;stroke:var(--green-600);flex:none}
.chk .s{color:var(--muted);font-size:11.5px;margin-left:auto;font-weight:600}
.chk b{font-weight:700}

/* lignes */
.row{display:flex;align-items:center;gap:14px;border:1px solid var(--line);border-radius:14px;padding:14px 16px;background:#fff;box-shadow:var(--sh-sm)}
.row .ri{width:40px;height:40px;border-radius:11px;display:flex;align-items:center;justify-content:center;flex:none;background:var(--green-50)}
.row .ri svg{width:19px;height:19px;stroke:var(--green-600)}
.row .rt{flex:1}
.row .rt .a{font-size:13.5px;font-weight:700;color:var(--ink)}
.row .rt .b{font-size:11.5px;color:var(--muted);margin-top:2px}
.row .rv{font-size:13.5px;font-weight:700;color:var(--slate);text-align:right;flex:none}

/* tableau */
.tbl{width:100%;border-collapse:collapse;font-size:12.5px}
.tbl th{text-align:left;font-size:9.5px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--muted);padding:0 0 9px;border-bottom:1px solid var(--line)}
.tbl th.r,.tbl td.r{text-align:right}
.tbl td{padding:10px 0;border-bottom:1px solid var(--line-2);color:var(--ink)}
.tbl tr:last-child td{border-bottom:none}
.tbl .tag{display:inline-block;background:var(--green-500);color:#fff;font-size:11px;font-weight:700;border-radius:6px;padding:3px 10px}
.tbl tfoot td{font-weight:700;color:var(--slate);border-top:1.5px solid var(--line);border-bottom:none;padding-top:12px}

/* flow ordre */
.flow{display:flex;align-items:center;gap:7px;flex-wrap:wrap}
.flow .fi{display:flex;align-items:center;gap:10px;background:var(--paper-2);border:1px solid var(--line);border-radius:12px;padding:9px 13px}
.flow .fi .n{width:23px;height:23px;border-radius:50%;background:var(--green-500);color:#fff;font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;flex:none}
.flow .fi .lt{font-size:12.5px;font-weight:700;color:var(--ink)}
.flow .fi .ld{font-size:11px;color:var(--muted)}
.flow .ar{stroke:#c7cdc4;width:16px;height:16px}

/* chips config */
.chips{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px}
.chip{display:inline-flex;align-items:center;gap:7px;background:var(--paper-2);border:1px solid var(--line);border-radius:99px;padding:7px 14px;font-size:12px;font-weight:700;color:var(--ink)}
.chip .k{color:var(--muted)}

/* badges */
.brow{display:flex;gap:9px;flex-wrap:wrap}
.badge{font-size:11px;font-weight:700;border-radius:99px;padding:6px 13px;display:inline-flex;align-items:center;gap:6px}
.badge svg{width:12px;height:12px}
.badge.gold{background:var(--amber-bg);color:var(--gold-d);border:1px solid var(--amber-bd)}.badge.gold svg{stroke:var(--gold-d)}
.badge.green{background:var(--green-50);color:var(--green-700);border:1px solid var(--green-100)}.badge.green svg{stroke:var(--green-600)}
.badge.slate{background:#eef3f4;color:var(--slate-d);border:1px solid #dde7e9}.badge.slate svg{stroke:var(--slate)}

/* carte feature (style home reassurance) */
.feat{background:#fff;border:1px solid var(--line);border-radius:16px;padding:18px 20px;box-shadow:var(--sh-sm);text-align:center}
.feat .fi{width:46px;height:46px;border-radius:13px;background:var(--green-50);display:flex;align-items:center;justify-content:center;margin:0 auto 12px}
.feat .fi svg{width:22px;height:22px;stroke:var(--green-600)}
.feat .ft{font-size:13.5px;font-weight:700;color:var(--ink)}
.feat .fd{font-size:11.5px;color:var(--muted);margin-top:3px;line-height:1.45}

/* produit hero (page 2) */
.hero-prod{display:flex;align-items:stretch;overflow:hidden}
.hero-prod .hp-img{width:170px;flex:none;background:linear-gradient(135deg,#6aac6a,#3d7a3d);position:relative}
.hero-prod .hp-img img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}
.hero-prod .hp-body{flex:1;padding:22px 24px;display:flex;flex-direction:column;justify-content:center}
.hero-prod .hp-name{font-size:23px;font-weight:700;color:var(--ink);letter-spacing:-.01em}
.hero-prod .hp-sub{font-size:12.5px;color:var(--muted);margin-top:3px;font-weight:600}
.hero-prod .hp-price{flex:none;width:200px;background:var(--slate-d);color:#fff;padding:22px 24px;display:flex;flex-direction:column;justify-content:center}
.hero-prod .hp-price .k{font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:#8fb0b6}
.hero-prod .hp-price .v{font-size:27px;font-weight:700;margin:3px 0}
.hero-prod .hp-price .kk{font-size:11px;color:#9fbbc0}

/* divers */
.soft{color:var(--muted)}
.kv{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--line-2);font-size:13px}
.kv:last-child{border-bottom:none}
.kv .k{color:var(--muted)} .kv .v{font-weight:700;color:var(--ink)}
.toc{display:grid}
.toc .ti{display:flex;align-items:center;gap:13px;padding:11px 0;border-bottom:1px solid var(--line-2);font-size:13px}
.toc .ti:last-child{border-bottom:none}
.toc .ti .tn{font-size:11px;font-weight:700;color:#fff;background:var(--green-500);width:24px;height:24px;border-radius:7px;display:flex;align-items:center;justify-content:center;flex:none}
.toc .ti .tt{flex:1;font-weight:700;color:var(--ink)}
.toc .ti .tp{font-size:12px;color:var(--muted);font-weight:700}
.season{background:#fff;border:1px solid var(--line);border-radius:14px;padding:15px 16px;box-shadow:var(--sh-sm)}
.season .sh{display:flex;align-items:center;gap:9px;font-size:13px;font-weight:700;color:var(--slate-d);margin-bottom:6px}
.season .sh svg{width:16px;height:16px;stroke:var(--green-600)}
.season .sd{font-size:11.5px;color:var(--muted);line-height:1.5}

/* ====== COUVERTURE ====== */
.cover{flex-direction:row;padding:0;background:#1c3a43}
.cover{flex-direction:row;padding:0;background:#fff}
.cover .cnt{width:67%;background:#fff;color:var(--ink);padding:20mm 18mm;display:flex;flex-direction:column;position:relative}
.cover .cnt .logo{height:42px;width:auto;display:block;align-self:flex-start;object-fit:contain;flex:none}
.cover .cnt .spacer{flex:1}
.cover .cnt .eyebrow{color:var(--gold-d)}.cover .cnt .eyebrow::before{background:var(--gold)}
.cover .cnt h1{font-size:48px;font-weight:700;line-height:1.03;letter-spacing:-.02em;color:var(--slate-d);margin-top:16px}
.cover .cnt h1 .g{color:var(--green-600)}
.cover .cnt .tline{font-size:15px;color:var(--muted);margin-top:12px;font-weight:600}
.cover .cnt .blk{margin-top:24px;padding-top:20px;border-top:1px solid var(--line);max-width:560px}
.cover .cnt .blk .k{font-size:10.5px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--muted)}
.cover .cnt .blk .v{font-size:19px;font-weight:700;margin-top:5px;color:var(--ink)}
.cover .cnt .blk .v .sep{color:#c7cdc4;margin:0 10px;font-weight:400}
.cover .cnt .blk.client .v{font-size:22px}
.cover .cnt .foot{margin-top:22px;display:flex;align-items:center;gap:10px;font-size:11.5px;color:var(--muted)}
.cover .cnt .foot .dot{width:4px;height:4px;border-radius:50%;background:#c7cdc4}
.cover .cnt .site{font-size:11.5px;color:var(--green-700);font-weight:600;margin-top:13px}
.cover .visual{width:33%;position:relative;overflow:hidden;background:
  repeating-linear-gradient(102deg,#3d7a3d 0 7px,#356b35 7px 14px),linear-gradient(160deg,#5aa05a,#2e5c33)}
.cover .visual::before{content:"";position:absolute;top:0;left:0;width:3px;height:100%;background:linear-gradient(var(--gold),#9c7510);z-index:2}
.cover .visual img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;display:block}
.cover .visual::after{content:"";position:absolute;inset:0;background:linear-gradient(180deg,transparent 55%,rgba(16,34,40,.45));pointer-events:none}
.cover .hero-pill{position:absolute;bottom:16mm;left:50%;transform:translateX(-50%);white-space:nowrap;background:rgba(255,255,255,.95);color:var(--green-700);font-size:11px;font-weight:700;border-radius:99px;padding:8px 14px;display:flex;align-items:center;gap:7px;box-shadow:0 8px 22px rgba(0,0,0,.22);z-index:3}
.cover .hero-pill svg{width:13px;height:13px;stroke:var(--green-600)}

/* ====== FIN ====== */
.end{flex-direction:row;padding:0;background:#fff}
.end .cnt{width:67%;background:#fff;color:var(--ink);padding:20mm 18mm;display:flex;flex-direction:column}
.end .cnt .logo{height:42px;width:auto;display:block;align-self:flex-start;object-fit:contain;flex:none}
.end .cnt .spacer{flex:1}
.end .eyebrow{color:var(--gold-d)}.end .eyebrow::before{background:var(--gold)}
.end h2{font-size:46px;font-weight:700;color:var(--slate-d);margin-top:15px;letter-spacing:-.02em;line-height:1.04}
.end p{font-size:14.5px;color:var(--muted);margin-top:13px;line-height:1.6;max-width:560px}
.end .band{margin-top:24px;background:linear-gradient(135deg,var(--green-600),var(--green-700));border-radius:18px;padding:20px 24px;display:flex;gap:14px;box-shadow:var(--sh-sm)}
.end .band .b{flex:1;display:flex;align-items:center;gap:12px;color:#fff}
.end .band .b svg{width:22px;height:22px;stroke:#fff;flex:none}
.end .band .b .bt{font-size:13px;font-weight:700;color:#fff}
.end .band .b .bd{font-size:11px;color:rgba(255,255,255,.78);margin-top:1px}
.end .band .vline{width:1px;background:rgba(255,255,255,.22)}
.end .contacts{margin-top:24px;display:flex;gap:30px;flex-wrap:wrap}
.end .contacts .c{display:flex;align-items:center;gap:11px}
.end .contacts .c svg{width:18px;height:18px;stroke:var(--green-600)}
.end .contacts .c .ct .k{font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--muted)}
.end .contacts .c .ct .v{font-size:14px;font-weight:700;color:var(--ink);margin-top:2px}
.end .visual{width:33%;position:relative;overflow:hidden;background:
  repeating-linear-gradient(102deg,#3d7a3d 0 7px,#356b35 7px 14px),linear-gradient(160deg,#5aa05a,#2e5c33)}
.end .visual::before{content:"";position:absolute;top:0;left:0;width:3px;height:100%;background:linear-gradient(var(--gold),#9c7510);z-index:2}
.end .visual img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;display:block}
.end .visual::after{content:"";position:absolute;inset:0;background:linear-gradient(180deg,transparent 55%,rgba(16,34,40,.45));pointer-events:none}
.end .visual .vtag{position:absolute;bottom:16mm;left:50%;transform:translateX(-50%);white-space:nowrap;background:rgba(255,255,255,.95);color:var(--green-700);font-size:11px;font-weight:700;border-radius:99px;padding:8px 14px;display:flex;align-items:center;gap:7px;box-shadow:0 8px 22px rgba(0,0,0,.22);z-index:3}
.end .visual .vtag svg{width:13px;height:13px;stroke:var(--green-600)}

/* utilitaires V4 */
.numdot{border-radius:50%;background:#fff;border:1.5px solid var(--green-500);color:var(--green-600);font-weight:700;display:inline-flex;align-items:center;justify-content:center;flex:none;box-shadow:0 0 0 4px var(--green-50)}
.diagram{width:100%;display:flex;align-items:center;justify-content:center}
.diagram svg{width:100%;height:100%;display:block}
.cond{display:flex;justify-content:space-around;align-items:center;text-align:center;gap:14px}
.cond .ci2{width:38px;height:38px;border-radius:11px;background:var(--green-50);display:flex;align-items:center;justify-content:center;margin:0 auto 8px}
.cond .ci2 svg{width:19px;height:19px;stroke:var(--green-600)}
.cond .ct2{font-size:13px;font-weight:700;color:var(--ink)}
.cond .cd2{font-size:11px;color:var(--muted);margin-top:2px}
.cond .vsep{width:1px;align-self:stretch;background:var(--line-2)}
.tip{display:flex;gap:12px;align-items:flex-start}
.tip .ti2{width:36px;height:36px;border-radius:10px;background:var(--green-50);display:flex;align-items:center;justify-content:center;flex:none}
.tip .ti2 svg{width:18px;height:18px;stroke:var(--green-600)}
.tip .tt2{font-size:13px;font-weight:700;color:var(--ink)}
.tip .td2{font-size:11.5px;color:var(--muted);margin-top:2px;line-height:1.45}

/* barre d'apercu — PREVIEW ONLY (jamais en print) */
.devbar{position:fixed;top:12px;left:50%;transform:translateX(-50%);z-index:9999;background:#fff;border:1px solid var(--line);border-radius:99px;padding:6px;display:flex;gap:6px;align-items:center;box-shadow:0 10px 30px rgba(0,0,0,.2);font-family:var(--font)}
.devbar .lbl{font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);padding:0 6px 0 10px}
.devbar button{border:none;background:var(--paper-2);color:var(--ink);font-size:12px;font-weight:700;border-radius:99px;padding:8px 14px;cursor:pointer;font-family:var(--font)}
.devbar button:hover{background:var(--green-50)}
.devbar button.on{background:var(--green-500);color:#fff}
@media print{.devbar{display:none!important}}
</style>
</head>
<body>
<div id="app"></div>
<script>
/* =====================================================================
   VERDEKO — DOSSIER DE POSE V3  (A4 paysage, 11 pages)
   DATA = contrat collectAllData(). Prod: window.VERDEKO_PDF_DATA.
   produit.image_cover = PHOTO 3 galerie (fallback photo 2).
   ===================================================================== */
const LOGO = 'https://verdeko.fr/wp-content/uploads/2026/04/logo-verdeko.webp';

const DATA = window.VERDEKO_PDF_DATA || {
  meta:   { date:"15/06/2026", ref:"VDK-2026-1042" },

function svg(name,cls){ return '<svg class="ic '+(cls||'')+'" viewBox="0 0 24 24">'+I[name]+'</svg>'; }
function ck(){ return '<span class="ckf"><svg viewBox="0 0 24 24"><path d="M20 6 9 17l-5-5"/></svg></span>'; }

/* helpers */
let D = DATA;
function eur(n){ return Number(n).toLocaleString('fr-FR',{minimumFractionDigits:2,maximumFractionDigits:2})+' €'; }
function m2(n){ return Number(n).toLocaleString('fr-FR',{minimumFractionDigits:n%1?2:0,maximumFractionDigits:2})+' m²'; }
function cap(s){ return s? s.charAt(0).toUpperCase()+s.slice(1):''; }
function nb(n){ return String(n).replace('.',','); }
let SURF = D.terrain.surface_brute || D.terrain.surface_nette;
let TOTAL = SURF * D.produit.prix_m2;
function lesRefs(){ const out=[]; D.calepinage.les.forEach(le=>{ const r=(le.leRefs&&le.leRefs.length)?le.leRefs:[le.ref]; r.forEach(x=>out.push({ref:x,largeur:le.largeur,longueur:le.longueur})); }); return out; }

function head(idx,section){
  let dots=''; for(let i=2;i<=TOTAL_PAGES;i++) dots+='<i class="'+(i===idx?'on':'')+'"></i>';
  return `<div class="pg-head">
    <div class="hl"><img class="lg" src="${LOGO}" alt="Verdeko"><span class="hsep"></span><div class="ht">${section}</div></div>
    <div class="hr"><div class="dots">${dots}</div><div class="pn"><b>${String(idx).padStart(2,'0')}</b> / ${TOTAL_PAGES}</div></div>
  </div><div class="pg-rule"></div>`;
}
function foot(){ return `<div class="pg-foot"><div class="fl"><span class="fg">Verdeko</span> — Dossier de pose personnalisé · <span class="fg">www.verdeko.fr</span></div><div class="fr">Réf. ${D.meta.ref}</div></div>`; }

/* projectTips mappé sur les vrais libellés Gravity Forms (form 2) :
   91 usage · 92 projet_pro · 93 sport · 94 animaux · 95 soleil. Aspect (96) ignoré (placeholders). */
function projectTips(){
  const q=D.questionnaire;
  const u=(q.usage||'').toLowerCase();
  const p=((q.projet_pro||'')+' '+(q.sous_projet||'')).toLowerCase();
  const sp=(q.sport||'').toLowerCase();
  const s=(q.soleil||'').toLowerCase();
  const t=[];
  // usage principal (champ 91)
  if(u.indexOf('piscine')>-1) t.push([svg('droplet'),'Bord de piscine','Gazon résistant au chlore et au sel. Soignez le drainage et la fixation près des margelles.']);
  if(u.indexOf('balcon')>-1||u.indexOf('terrasse')>-1) t.push([svg('layers'),'Terrasse & balcon','Pas de décaissement : posez sur support propre, soignez l\'écoulement de l\'eau et fixez bien le périmètre.']);
  if(u.indexOf('passage')>-1||u.indexOf('intensif')>-1||u.indexOf('jeux')>-1) t.push([svg('tool'),'Passage intensif & jeux','Brossage plus fréquent et lestage en sable de silice pour préserver la tenue des brins.']);
  if(u.indexOf('naturel')>-1) t.push([svg('eye'),'Effet naturel','Brins multi-tons et fil frisé : un brossage régulier conserve l\'effet « vraie pelouse ».']);
  if(u.indexOf('jardin')>-1) t.push([svg('flower'),'Jardin & vie quotidienne','Entretien minimal : brossage saisonnier et rinçage occasionnel suffisent toute l\'année.']);
  // pro / sport (champs 92 / 93)
  if(sp.indexOf('putting')>-1||p.indexOf('golf')>-1) t.push([svg('star'),'Putting green','Sable de lestage pour la vitesse de roulement, aspect ras, brossage régulier.']);
  else if(sp.indexOf('padel')>-1||sp.indexOf('tennis')>-1) t.push([svg('tool'),'Padel / Tennis','Lestage sable pour le rebond et la stabilité des lignes. Brossage fréquent.']);
  else if(sp.indexOf('multisport')>-1) t.push([svg('shield'),'Multisport','Fibres robustes : lestage et brossage réguliers pour encaisser le passage.']);
  if(p.indexOf('restaurant')>-1||p.indexOf('hôtel')>-1||p.indexOf('hotel')>-1) t.push([svg('star'),'Lieu public','Passage soutenu : brossage renforcé et nettoyage fréquent pour garder l\'aspect neuf.']);
  if(p.indexOf('école')>-1||p.indexOf('ecole')>-1||p.indexOf('aire de jeux')>-1) t.push([svg('shield'),'Aire de jeux','Sous-couche amortissante conseillée et nettoyage régulier de la zone.']);
  if(p.indexOf('événementiel')>-1||p.indexOf('evenement')>-1||p.indexOf('stand')>-1) t.push([svg('pkg'),'Événementiel','Pose temporaire : fixation légère et réutilisable, stockage à plat.']);
  // animaux (champ 94)
  if(q.has_animaux) t.push([svg('paw'),'Vous avez des animaux','Zone toilette dédiée, rinçage 2 à 3 fois/semaine, nettoyant enzymatique. Accès 48 h après la pose.']);
  // soleil (champ 95)
  if(s.indexOf('plein soleil')>-1) t.push([svg('sun'),'Plein soleil','Fibres traitées anti-UV (garantie 15 ans). Par forte chaleur, un rinçage rafraîchit la surface.']);
  else if(s.indexOf('ombre')>-1) t.push([svg('droplet'),'Zone ombragée','Surveillez mousses et humidité : brossez les feuilles et nettoyez un peu plus souvent.']);
  if(!t.length) t.push([svg('checkc'),'Conseil clé','Respectez le sens des brins et brossez après la pose pour un rendu optimal.']);
  return t.slice(0,4);
}

  if(a.enzyme) items.push([svg('spray'),'Nettoyant enzymatique',a.enzyme.description,a.enzyme.bouteilles+' bouteille(s)']);
  const rows=items.map(it=>`<div class="row"><span class="ri">${it[0]}</span><div class="rt"><div class="a">${it[1]}</div><div class="b">${it[2]}</div></div><div class="rv">${it[3]}</div></div>`).join('');
  const body=`
    <div class="eyebrow">Pour une pose complète</div>
    <h2 class="h-sec">Accessoires & <span class="hl-mark">quantités</span></h2>
    <p class="lead">Quantités calculées automatiquement à partir de votre surface, de votre type de sol et du nombre de jonctions de votre plan.</p>

    <div style="display:flex;flex-direction:column;gap:12px;margin-top:18px">${rows}</div>
    <div class="callout info" style="margin-top:18px">${ck()}<div class="ct"><b>Bon à savoir.</b> Le géotextile est recommandé sur sol meuble. La bande de jonction et la colle ne sont nécessaires que si votre plan comporte des raccords entre lés.</div></div>

    <div class="grid-3" style="margin-top:auto;padding-top:18px">
      <div class="feat"><div class="fi">${svg('shield')}</div><div class="ft">Garantie 15 ans</div><div class="fd">UV & usure normale</div></div>
      <div class="feat"><div class="fi">${svg('truck')}</div><div class="ft">Livraison offerte</div><div class="fd">France entière</div></div>
      <div class="feat"><div class="fi">${svg('star')}</div><div class="ft">Gazon premium</div><div class="fd">Qualité paysagiste</div></div>
    </div>`;
  return page(10,'Accessoires & quantités',body);
}

/* PAGE 11 — FIN (variante de la couverture) */
function pEnd(){
  return `<div class="page end">
    <div class="cnt">
      <img class="logo" src="${LOGO}" alt="Verdeko">
      <div class="spacer"></div>
      <div class="eyebrow">Votre projet prend forme</div>
      <h2>Bonne installation,<br>${D.client.prenom||'et à bientôt'} !</h2>
      <p>Votre dossier est prêt. Suivez les étapes dans l'ordre, prenez votre temps sur la préparation du sol et les jonctions : c'est la clé d'un rendu parfait. Notre équipe reste à votre disposition.</p>
      <div class="band">
        <div class="b">${svg('shield')}<div><div class="bt">Garantie 15 ans</div><div class="bd">UV & usure normale</div></div></div>
        <div class="vline"></div>
        <div class="b">${svg('truck')}<div><div class="bt">Livraison offerte</div><div class="bd">France entière</div></div></div>
        <div class="vline"></div>
        <div class="b">${svg('star')}<div><div class="bt">Gazon premium</div><div class="bd">Qualité paysagiste</div></div></div>
      </div>
      <div class="contacts">
        <div class="c">${svg('mail')}<div class="ct"><div class="k">Avant-vente</div><div class="v">contact@verdeko.fr</div></div></div>
        <div class="c">${svg('mail')}<div class="ct"><div class="k">Support</div><div class="v">sav@verdeko.fr</div></div></div>
        <div class="c">${svg('globe')}<div class="ct"><div class="k">Site</div><div class="v">www.verdeko.fr</div></div></div>
      </div>
      <div class="spacer"></div>
    </div>
    <div class="visual">
      <img src="${D.produit.image_cover}" alt="" onerror="this.style.display='none'">
      <div class="vtag">${svg('leaf')}${D.produit.nom}</div>
    </div>
  </div>`;
}

/* ====================================================================
   MONTAGE (PROD)
   window.VERDEKO_PDF_DATA est injecté par le service avant </head>.
   En l'absence d'injection, le DATA d'exemple sert d'aperçu autonome.
   ==================================================================== */
function paint(){
  if(!D.meta || typeof D.meta!=='object') D.meta={};
  if(!D.meta.date) D.meta.date = new Date().toLocaleDateString('fr-FR');
  if(D.meta.ref==null) D.meta.ref='';
  SURF = D.terrain.surface_brute || D.terrain.surface_nette;
  TOTAL = SURF * D.produit.prix_m2;
  document.getElementById('app').innerHTML =
    [pCover(),pProjet(),pPlan(),pMateriel(),pSol(),pPose(),pJonctions(),pFixation(),pEntretien(),pAccessoires(),pEnd()].join('');
  window.__verdekoReady = true;
}
if (window.VERDEKO_PDF_DATA) D = window.VERDEKO_PDF_DATA;
paint();

</script>
</body>
