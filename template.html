<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Verdeko — Dossier de pose</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap');
:root{
  --green-700:#2e5c33; --green-600:#3d7a3d; --green-500:#509350; --green-400:#6aac6a;
  --green-100:#eaf4ea; --green-50:#f3f8f3; --action:#3A8349;
  --mark:#c4e6c6;
  --ink:#23272a; --muted:#6b7770; --line:#e8e4da; --line-2:#efeae0;
  --paper:#f8f7f2; --paper-2:#ece4d4; --card:#ffffff;
  --slate:#2F5C69; --slate-d:#23454f;
  --gold:#c9a227; --gold-d:#a87b14; --amber-bg:#fdf6e7; --amber-bd:#ecd9a6;
  --danger:#c0492f; --danger-bg:#fcf0ed; --danger-bd:#f0d4cc;
  --sh-sm:0 1px 2px rgba(28,42,33,.04),0 6px 18px rgba(28,42,33,.05);
  --sh-md:0 2px 6px rgba(28,42,33,.06),0 18px 40px rgba(28,42,33,.10);
  --font:'Proxima Nova','Montserrat',ui-sans-serif,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
html{-webkit-print-color-adjust:exact;print-color-adjust:exact}
body{font-family:var(--font);color:var(--ink);line-height:1.5;-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility}
svg.ic{stroke:currentColor;fill:none;stroke-width:1.9;stroke-linecap:round;stroke-linejoin:round;flex:none;display:block}
.hl-mark{background:linear-gradient(transparent 55%, var(--mark) 55% 94%, transparent 94%);padding:0 .07em}

/* ===== PAGE A4 PAYSAGE ===== */
@page{size:A4 landscape;margin:0}
.page{width:297mm;height:210mm;background:var(--paper);position:relative;overflow:hidden;display:flex;flex-direction:column}
@media screen{ body{background:#5b6660;padding:26px 0} .page{margin:0 auto 26px;box-shadow:0 12px 46px rgba(0,0,0,.34);border-radius:2px} }
@media print{ .page{box-shadow:none;margin:0;border-radius:0;page-break-after:always} .page:last-child{page-break-after:auto} }

/* ===== EN-TETE / PIED ===== */
.pg-head{display:flex;align-items:center;justify-content:space-between;padding:11mm 15mm 0}
.pg-head .hl{display:flex;align-items:center;gap:14px}
.pg-head .lg{height:34px;width:auto;display:block;position:relative;top:2px}
.pg-head .hsep{width:1px;height:19px;background:var(--line)}
.pg-head .ht{font-size:12.5px;font-weight:700;color:var(--slate-d);letter-spacing:.005em;line-height:1}
.pg-head .hr{display:flex;align-items:center;gap:12px}
.pg-head .dots{display:flex;gap:5px}
.pg-head .dots i{width:5px;height:5px;border-radius:50%;background:var(--line);display:block}
.pg-head .dots i.on{background:var(--green-500);width:15px;border-radius:3px}
.pg-head .pn{font-size:12px;font-weight:700;color:var(--muted);letter-spacing:.05em}
.pg-head .pn b{color:var(--slate-d)}
.pg-rule{height:1px;background:var(--line);margin:9px 15mm 0}
.pg-body{flex:1;padding:7mm 15mm 16mm;display:flex;flex-direction:column;min-height:0;overflow:hidden}
.pg-foot{position:absolute;bottom:0;left:0;right:0;display:flex;align-items:flex-end;justify-content:space-between;padding:0 15mm 9mm}
.pg-foot .fl{font-size:11.5px;color:var(--muted);letter-spacing:.005em}
.pg-foot .fl .fg{color:var(--green-700);font-weight:700}
.pg-foot .fr{font-size:11px;color:var(--muted);font-weight:600}

/* eyebrow + titres */
.eyebrow{font-size:11px;font-weight:700;letter-spacing:.15em;text-transform:uppercase;color:var(--gold-d);display:flex;align-items:center;gap:9px}
.eyebrow::before{content:"";width:22px;height:2px;background:var(--gold);border-radius:2px}
.h-sec{font-size:27px;font-weight:700;color:var(--slate-d);letter-spacing:-.012em;margin-top:7px;line-height:1.1}
.lead{font-size:13.5px;color:var(--muted);margin-top:7px;max-width:610px;line-height:1.55}
.lead b{color:var(--ink)}

/* cartes */
.card{background:var(--card);border:1px solid var(--line);border-radius:18px;box-shadow:var(--sh-sm)}
.card-pad{padding:20px 23px}
.card-h{display:flex;align-items:center;gap:11px;margin-bottom:15px}
.card-h .ci{width:32px;height:32px;border-radius:10px;background:var(--green-50);display:flex;align-items:center;justify-content:center}
.card-h .ci svg{width:17px;height:17px;stroke:var(--green-600)}
.card-h h3{font-size:15px;font-weight:700;color:var(--ink)}
.card-h .meta{margin-left:auto;font-size:12px;font-weight:700;color:var(--slate)}

/* grilles */
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:18px}
.grid-3{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}
.grid-4{display:grid;grid-template-columns:repeat(4,1fr);gap:14px}

/* check rond plein (style home) */
.ckf{width:22px;height:22px;border-radius:50%;background:var(--green-500);display:inline-flex;align-items:center;justify-content:center;flex:none}
.ckf svg{width:12px;height:12px;stroke:#fff;fill:none;stroke-width:2.6;stroke-linecap:round;stroke-linejoin:round}

/* etapes numerotees */
.steps{display:grid;gap:16px}
.step{display:flex;gap:15px;align-items:flex-start}
.step .nb{width:34px;height:34px;border-radius:50%;background:#fff;border:1.5px solid var(--green-500);color:var(--green-600);font-size:15px;font-weight:700;display:flex;align-items:center;justify-content:center;flex:none;box-shadow:0 0 0 5px var(--green-50)}
.step .st-b{padding-top:2px}
.step .st-b .t{font-size:14px;font-weight:700;color:var(--ink);margin-bottom:3px}
.step .st-b .d{font-size:12.5px;color:var(--muted);line-height:1.55}
.step .st-b .d b{color:var(--ink);font-weight:700}

/* callouts */
.callout{display:flex;gap:13px;align-items:flex-start;border-radius:14px;padding:15px 18px;border:1px solid}
.callout svg{width:19px;height:19px;flex:none;margin-top:1px}
.callout .ct{font-size:12.5px;line-height:1.55}
.callout .ct b{font-weight:700}
.callout.warn{background:var(--amber-bg);border-color:var(--amber-bd);color:#6e560f}.callout.warn svg{stroke:var(--gold-d)}.callout.warn .ct b{color:var(--gold-d)}
.callout.info{background:var(--green-50);border-color:var(--green-100);color:#33503a}.callout.info svg{stroke:var(--green-600)}.callout.info .ct b{color:var(--green-700)}
.callout.danger{background:var(--danger-bg);border-color:var(--danger-bd);color:#7a2e1d}.callout.danger svg{stroke:var(--danger)}.callout.danger .ct b{color:var(--danger)}

/* stat tiles */
.stat{background:#fff;border:1px solid var(--line);border-radius:14px;padding:16px 8px;text-align:center;box-shadow:var(--sh-sm)}
.stat .v{font-size:21px;font-weight:700;color:var(--slate)}
.stat .v .u{font-size:12px;font-weight:700;color:var(--muted)}
.stat .l{font-size:9.5px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--muted);margin-top:4px}

/* listes check / icones */
.checks{display:grid;gap:12px}
.chk{display:flex;align-items:center;gap:12px;font-size:13px;color:var(--ink);line-height:1.4}
.chk>svg.ic{width:18px;height:18px;stroke:var(--green-600);flex:none}
.chk .s{color:var(--muted);font-size:11.5px;margin-left:auto;font-weight:600}
.chk b{font-weight:700}
.tool-list{display:flex;flex-direction:column}
.tool-line{display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid var(--line-2)}
.tool-line:last-child{border-bottom:none}
.tool-line>svg.ic{width:18px;height:18px;stroke:var(--green-600);flex:none}
.tool-line .tl-name{font-size:13.5px;color:var(--ink);font-weight:600;flex:1;line-height:1.3}
.tool-line .tl-tag{font-size:10px;font-weight:700;letter-spacing:.03em;text-transform:uppercase;color:var(--muted);background:var(--paper-2);border:1px solid var(--line);border-radius:99px;padding:3px 10px;flex:none;white-space:nowrap}

/* lignes */
.row{display:flex;align-items:center;gap:14px;border:1px solid var(--line);border-radius:14px;padding:14px 16px;background:#fff;box-shadow:var(--sh-sm)}
.row .ri{width:40px;height:40px;border-radius:11px;display:flex;align-items:center;justify-content:center;flex:none;background:var(--green-50)}
.row .ri svg{width:19px;height:19px;stroke:var(--green-600)}
.row .rt{flex:1}
.row .rt .a{font-size:13.5px;font-weight:700;color:var(--ink)}
.row .rt .b{font-size:11.5px;color:var(--muted);margin-top:2px}
.row .rv{font-size:13.5px;font-weight:700;color:var(--slate);text-align:right;flex:none}

/* tableau */
.tbl{width:100%;border-collapse:collapse;font-size:12.5px}
.tbl th{text-align:left;font-size:9.5px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--muted);padding:0 0 9px;border-bottom:1px solid var(--line)}
.tbl th.r,.tbl td.r{text-align:right}
.tbl td{padding:10px 0;border-bottom:1px solid var(--line-2);color:var(--ink)}
.tbl tr:last-child td{border-bottom:none}
.tbl .tag{display:inline-block;background:var(--green-500);color:#fff;font-size:11px;font-weight:700;border-radius:6px;padding:3px 10px}
.tbl tfoot td{font-weight:700;color:var(--slate);border-top:1.5px solid var(--line);border-bottom:none;padding-top:12px}

/* flow ordre */
.flow{display:flex;align-items:center;gap:7px;flex-wrap:wrap}
.flow .fi{display:flex;align-items:center;gap:10px;background:var(--paper-2);border:1px solid var(--line);border-radius:12px;padding:9px 13px}
.flow .fi .n{width:23px;height:23px;border-radius:50%;background:var(--green-500);color:#fff;font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;flex:none}
.flow .fi .lt{font-size:12.5px;font-weight:700;color:var(--ink)}
.flow .fi .ld{font-size:11px;color:var(--muted)}
.flow .ar{stroke:#c7cdc4;width:16px;height:16px}

/* chips config */
.chips{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px}
.chip{display:inline-flex;align-items:center;gap:7px;background:var(--paper-2);border:1px solid var(--line);border-radius:99px;padding:7px 14px;font-size:12px;font-weight:700;color:var(--ink);white-space:nowrap}
.chip .k{color:var(--muted)}

/* badges */
.brow{display:flex;gap:9px;flex-wrap:wrap}
.badge{font-size:11px;font-weight:700;border-radius:99px;padding:6px 13px;display:inline-flex;align-items:center;gap:6px}
.badge svg{width:12px;height:12px}
.badge.gold{background:var(--amber-bg);color:var(--gold-d);border:1px solid var(--amber-bd)}.badge.gold svg{stroke:var(--gold-d)}
.badge.green{background:var(--green-50);color:var(--green-700);border:1px solid var(--green-100)}.badge.green svg{stroke:var(--green-600)}
.badge.slate{background:#eef3f4;color:var(--slate-d);border:1px solid #dde7e9}.badge.slate svg{stroke:var(--slate)}

/* carte feature (style home reassurance) */
.feat{background:#fff;border:1px solid var(--line);border-radius:16px;padding:18px 20px;box-shadow:var(--sh-sm);text-align:center}
.feat .fi{width:46px;height:46px;border-radius:13px;background:var(--green-50);display:flex;align-items:center;justify-content:center;margin:0 auto 12px}
.feat .fi svg{width:22px;height:22px;stroke:var(--green-600)}
.feat .ft{font-size:13.5px;font-weight:700;color:var(--ink)}
.feat .fd{font-size:11.5px;color:var(--muted);margin-top:3px;line-height:1.45}

/* produit hero (page 2) */
.hero-prod{display:flex;align-items:stretch;overflow:hidden}
.hero-prod .hp-img{width:170px;flex:none;background:linear-gradient(135deg,#6aac6a,#3d7a3d);position:relative}
.hero-prod .hp-img img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}
.hero-prod .hp-body{flex:1;padding:22px 24px;display:flex;flex-direction:column;justify-content:center}
.hero-prod .hp-name{font-size:23px;font-weight:700;color:var(--ink);letter-spacing:-.01em}
.hero-prod .hp-sub{font-size:12.5px;color:var(--muted);margin-top:3px;font-weight:600}
.hero-prod .hp-price{flex:none;width:200px;background:var(--slate-d);color:#fff;padding:22px 24px;display:flex;flex-direction:column;justify-content:center}
.hero-prod .hp-price .k{font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:#8fb0b6}
.hero-prod .hp-price .v{font-size:27px;font-weight:700;margin:3px 0}
.hero-prod .hp-price .kk{font-size:11px;color:#9fbbc0}

/* divers */
.soft{color:var(--muted)}
.kv{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--line-2);font-size:13px}
.kv:last-child{border-bottom:none}
.kv .k{color:var(--muted)} .kv .v{font-weight:700;color:var(--ink)}
.toc{display:grid}
.toc .ti{display:flex;align-items:center;gap:13px;padding:7px 0;border-bottom:1px solid var(--line-2);font-size:13px}
.toc .ti:last-child{border-bottom:none}
.toc .ti .tn{font-size:11px;font-weight:700;color:#fff;background:var(--green-500);width:24px;height:24px;border-radius:7px;display:flex;align-items:center;justify-content:center;flex:none}
.toc .ti .tt{flex:1;font-weight:700;color:var(--ink)}
.toc .ti .tp{font-size:12px;color:var(--muted);font-weight:700}
.season{background:#fff;border:1px solid var(--line);border-radius:14px;padding:15px 16px;box-shadow:var(--sh-sm)}
.season .sh{display:flex;align-items:center;gap:9px;font-size:13px;font-weight:700;color:var(--slate-d);margin-bottom:6px}
.season .sh svg{width:16px;height:16px;stroke:var(--green-600)}
.season .sd{font-size:11.5px;color:var(--muted);line-height:1.5}

/* ====== COUVERTURE ====== */
.cover{flex-direction:row;padding:0;background:#1c3a43}
.cover{flex-direction:row;padding:0;background:var(--paper)}
.cover .cnt{width:67%;background:var(--paper);color:var(--ink);padding:20mm 18mm;display:flex;flex-direction:column;position:relative}
.cover .cnt .logo{height:56px;width:auto;display:block;align-self:flex-start;object-fit:contain;flex:none}
.cover .cnt .spacer{flex:1}
.cover .cnt .eyebrow{color:var(--gold-d)}.cover .cnt .eyebrow::before{background:var(--gold)}
.cover .cnt h1{font-size:48px;font-weight:700;line-height:1.03;letter-spacing:-.02em;color:var(--slate-d);margin-top:16px}
.cover .cnt h1 .g{color:var(--green-600)}
.cover .cnt .tline{font-size:15px;color:var(--muted);margin-top:12px;font-weight:600}
.cover .cnt .blk{margin-top:24px;padding-top:20px;border-top:1px solid var(--line);max-width:560px}
.cover .cnt .blk .k{font-size:10.5px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--muted)}
.cover .cnt .blk .v{font-size:19px;font-weight:700;margin-top:5px;color:var(--ink)}
.cover .cnt .blk .v .sep{color:#c7cdc4;margin:0 10px;font-weight:400}
.cover .cnt .blk.client .v{font-size:22px;color:var(--green-600)}
.cover .cnt .foot{margin-top:22px;display:flex;align-items:center;gap:10px;font-size:11.5px;color:var(--muted)}
.cover .cnt .foot .dot{width:4px;height:4px;border-radius:50%;background:#c7cdc4}
.cover .cnt .site{font-size:11.5px;color:var(--green-700);font-weight:600;margin-top:13px}
.cover .visual{width:33%;position:relative;overflow:hidden;background:
  repeating-linear-gradient(102deg,#3d7a3d 0 7px,#356b35 7px 14px),linear-gradient(160deg,#5aa05a,#2e5c33)}
.cover .visual::before{content:none}
.cover .visual img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;display:block}
.cover .visual::after{content:"";position:absolute;inset:0;background:linear-gradient(180deg,transparent 55%,rgba(16,34,40,.45));pointer-events:none}
.cover .hero-pill{position:absolute;bottom:16mm;left:50%;transform:translateX(-50%);white-space:nowrap;background:rgba(255,255,255,.95);color:var(--green-700);font-size:11px;font-weight:700;border-radius:99px;padding:8px 14px;display:flex;align-items:center;gap:7px;box-shadow:0 8px 22px rgba(0,0,0,.22);z-index:3}
.cover .hero-pill svg{width:13px;height:13px;stroke:var(--green-600)}

/* ====== FIN ====== */
.end{flex-direction:row;padding:0;background:var(--paper)}
.end .cnt{width:67%;background:var(--paper);color:var(--ink);padding:20mm 18mm;display:flex;flex-direction:column}
.end .cnt .logo{height:56px;width:auto;display:block;align-self:flex-start;object-fit:contain;flex:none}
.end .cnt .spacer{flex:1}
.end .eyebrow{color:var(--gold-d)}.end .eyebrow::before{background:var(--gold)}
.end h2{font-size:46px;font-weight:700;color:var(--slate-d);margin-top:15px;letter-spacing:-.02em;line-height:1.04}
.end p{font-size:14.5px;color:var(--muted);margin-top:13px;line-height:1.6;max-width:560px}
.end .band{margin-top:24px;background:linear-gradient(135deg,var(--green-600),var(--green-700));border-radius:18px;padding:20px 24px;display:flex;gap:14px;box-shadow:var(--sh-sm)}
.end .band .b{flex:1;display:flex;align-items:center;gap:12px;color:#fff}
.end .band .b svg{width:22px;height:22px;stroke:#fff;flex:none}
.end .band .b .bt{font-size:13px;font-weight:700;color:#fff}
.end .band .b .bd{font-size:11px;color:rgba(255,255,255,.78);margin-top:1px}
.end .band .vline{width:1px;background:rgba(255,255,255,.22)}
.end .contacts{margin-top:24px;display:flex;gap:30px;flex-wrap:wrap}
.end .contacts .c{display:flex;align-items:center;gap:11px}
.end .contacts .c svg{width:18px;height:18px;stroke:var(--green-600)}
.end .contacts .c .ct .k{font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--muted)}
.end .contacts .c .ct .v{font-size:14px;font-weight:700;color:var(--ink);margin-top:2px}
.end .visual{width:33%;position:relative;overflow:hidden;background:
  repeating-linear-gradient(102deg,#3d7a3d 0 7px,#356b35 7px 14px),linear-gradient(160deg,#5aa05a,#2e5c33)}
.end .visual::before{content:none}
.end .visual img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;display:block}
.end .visual::after{content:"";position:absolute;inset:0;background:linear-gradient(180deg,transparent 55%,rgba(16,34,40,.45));pointer-events:none}
.end .visual .vtag{position:absolute;bottom:16mm;left:50%;transform:translateX(-50%);white-space:nowrap;background:rgba(255,255,255,.95);color:var(--green-700);font-size:11px;font-weight:700;border-radius:99px;padding:8px 14px;display:flex;align-items:center;gap:7px;box-shadow:0 8px 22px rgba(0,0,0,.22);z-index:3}
.end .visual .vtag svg{width:13px;height:13px;stroke:var(--green-600)}

/* utilitaires V4 */
.numdot{border-radius:50%;background:#fff;border:1.5px solid var(--green-500);color:var(--green-600);font-weight:700;display:inline-flex;align-items:center;justify-content:center;flex:none;box-shadow:0 0 0 4px var(--green-50)}
.diagram{width:100%;display:flex;align-items:center;justify-content:center}
.diagram svg{width:100%;height:100%;display:block}
.cond{display:flex;justify-content:space-around;align-items:center;text-align:center;gap:14px}
.cond .ci2{width:38px;height:38px;border-radius:11px;background:var(--green-50);display:flex;align-items:center;justify-content:center;margin:0 auto 8px}
.cond .ci2 svg{width:19px;height:19px;stroke:var(--green-600)}
.cond .ct2{font-size:13px;font-weight:700;color:var(--ink)}
.cond .cd2{font-size:11px;color:var(--muted);margin-top:2px}
.cond .vsep{width:1px;align-self:stretch;background:var(--line-2)}
.tip{display:flex;gap:12px;align-items:flex-start}
.tip .ti2{width:36px;height:36px;border-radius:10px;background:var(--green-50);display:flex;align-items:center;justify-content:center;flex:none}
.tip .ti2 svg{width:18px;height:18px;stroke:var(--green-600)}
.tip .tt2{font-size:13px;font-weight:700;color:var(--ink)}
.tip .td2{font-size:11.5px;color:var(--muted);margin-top:2px;line-height:1.45}

/* barre d'apercu — PREVIEW ONLY (jamais en print) */
.devbar{position:fixed;top:12px;left:50%;transform:translateX(-50%);z-index:9999;background:#fff;border:1px solid var(--line);border-radius:99px;padding:6px;display:flex;gap:6px;align-items:center;box-shadow:0 10px 30px rgba(0,0,0,.2);font-family:var(--font)}
.devbar .lbl{font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);padding:0 6px 0 10px}
.devbar button{border:none;background:var(--paper-2);color:var(--ink);font-size:12px;font-weight:700;border-radius:99px;padding:8px 14px;cursor:pointer;font-family:var(--font)}
.devbar button:hover{background:var(--green-50)}
.devbar button.on{background:var(--green-500);color:#fff}
@media print{.devbar{display:none!important}}

/* Ordre de pose (page dediee) */
.ord-grid{display:flex;flex-wrap:wrap;gap:12px}
.ord-card{flex:0 0 auto;min-width:148px;display:flex;align-items:center;gap:11px;background:var(--cream,#faf7f2);border:1px solid var(--cream-bd,#ECE6DC);border-radius:12px;padding:11px 15px}
.ord-card .ord-n{width:30px;height:30px;border-radius:50%;background:var(--green-600);color:#fff;font-weight:700;font-size:14px;display:flex;align-items:center;justify-content:center;flex:none}
.ord-ref{font-size:14px;font-weight:700;color:var(--ink)}
.ord-dim{font-size:12px;color:var(--muted);margin-top:1px}
/* 4 erreurs */
.err{display:flex;gap:11px;align-items:flex-start}
.err-n{width:24px;height:24px;border-radius:50%;background:#d9534f;color:#fff;font-weight:700;font-size:12px;display:flex;align-items:center;justify-content:center;flex:none;margin-top:1px}
.err-t{font-size:13.5px;font-weight:700;color:var(--ink)}
.err-d{font-size:12px;color:var(--muted);line-height:1.5;margin-top:2px}
</style>
</head>
<body>
<div id="app"></div>
<script>
/* =====================================================================
   VERDEKO — DOSSIER DE POSE V3  (A4 paysage, 11 pages)
   DATA = contrat collectAllData(). Prod: window.VERDEKO_PDF_DATA.
   produit.image_cover = PHOTO 3 galerie (fallback photo 2).
   ===================================================================== */
const LOGO = 'https://verdeko.fr/wp-content/uploads/2026/04/logo-verdeko.webp';

const DATA = window.VERDEKO_PDF_DATA || {
  meta:   { date:"15/06/2026", ref:"VDK-2026-1042" },
  client: { prenom:"Stévan", nom:"Réhault", email:"stevan@diginative.fr",
            telephone:"+33 6 50 01 61 35", nom_complet:"Stévan Réhault" },
  terrain:{ forme:"Complexe", surface_nette:96, surface_brute:96,
            dimensions:{A:12,B:10}, perimetre_ml:54, obstacles:[], largeur:10, longueur:12 },
  produit:{ nom:"NATURA 50 mm", prix_m2:32.90, prix:32.90, prix_original:32.90,
            id:"11966", recommande:true, largeurs_disponibles:[2,4],
            image:"https://preprod.verdeko.fr/wp-content/uploads/2022/12/Gazon-synthetique-natura-4.jpg",
            image_cover:"https://preprod.verdeko.fr/wp-content/uploads/2022/12/Gazon-synthetique-natura-4.jpg" },
  calepinage:{
    les:[ { ref:"L1a", largeur:4, longueur:3,  quantite:2, surface:24, leRefs:["L1a","L1b"] },
          { ref:"L2",  largeur:4, longueur:12, quantite:1, surface:48, leRefs:["L2"] },
          { ref:"L3",  largeur:2, longueur:12, quantite:1, surface:24, leRefs:["L3"] } ],
    nb_les:4, orientation:"horizontal", chutes_percent:6.3, nb_jonctions:3, jonctions_ml:30, svg:"", description:"" },
  questionnaire:{ type_sol:"terre", is_sol_meuble:true, animaux:"Oui", has_animaux:true,
    soleil:"Plein soleil", aspect:"", usage:"Jardin & Vie quotidienne", type_projet:"Particulier",
    sous_projet:"", projet_pro:"", sport:"" },
  accessoires:{
    geotextile:{ m2:111, rouleaux:5, description:"Anti-repousse, stabilise le sable" },
    bande_jonction:{ ml:24, unites:3, description:"Pour assembler les lés bord à bord" },
    pointes:{ boites:1, description:"Fixation du périmètre" },
    enzyme:{ bouteilles:2, description:"Neutralise les odeurs animales" } }
};
let TOTAL_PAGES = 14;

/* icones */
const I = {
  leaf:'<path d="M11 21c-5 0-8-4-8-9 0 0 6 1 9 5 2 3 1 8-1 4z"/><path d="M11 21C9 12 14 5 21 3c1 9-4 16-10 18z"/>',
  eye:'<path d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7-10-7-10-7z"/><circle cx="12" cy="12" r="3"/>',
  layers:'<path d="M12 2 2 7l10 5 10-5z"/><path d="M2 12l10 5 10-5M2 17l10 5 10-5"/>',
  ruler:'<path d="M3 11 11 3l10 10-8 8z"/><path d="M7 7l2 2M9 13l2 2M13 9l2 2"/>',
  scissors:'<circle cx="6" cy="6" r="3"/><circle cx="6" cy="18" r="3"/><path d="M20 4 8.1 15.9M14.5 14.5 20 20M8.1 8.1 12 12"/>',
  broom:'<path d="M19 4 9 14M4 20l4-1 7-7-3-3-7 7z"/><path d="M5 21c1-1 2-2 4-2"/>',
  hammer:'<path d="M14 5l4 4-2 2-4-4z"/><path d="M12 7 4 15l3 3 8-8"/>',
  tool:'<path d="M14 7a4 4 0 0 1-5 5L5 16l3 3 4-4a4 4 0 0 0 5-5z"/>',
  droplet:'<path d="M12 3s6 7 6 11a6 6 0 0 1-12 0c0-4 6-11 6-11z"/>',
  sun:'<circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4 12H2M22 12h-2M5 5l1.5 1.5M17.5 17.5 19 19M19 5l-1.5 1.5M6.5 17.5 5 19"/>',
  paw:'<circle cx="6" cy="10" r="1.6"/><circle cx="10" cy="6.5" r="1.6"/><circle cx="14" cy="6.5" r="1.6"/><circle cx="18" cy="10" r="1.6"/><path d="M8 15c0-2.5 1.8-4 4-4s4 1.5 4 4c0 2-2 3-4 3s-4-1-4-3z"/>',
  shield:'<path d="M12 2l8 3v6c0 5-3.4 9.4-8 11-4.6-1.6-8-6-8-11V5z"/>',
  truck:'<rect x="1" y="4" width="14" height="12" rx="1"/><path d="M15 8h4l3 3v5h-7zM5.5 19.5a2 2 0 1 0 0 .01M18.5 19.5a2 2 0 1 0 0 .01"/>',
  clock:'<circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 2"/>',
  thermo:'<path d="M14 14V5a2 2 0 0 0-4 0v9a4 4 0 1 0 4 0z"/>',
  alert:'<path d="M12 3 2 20h20z"/><path d="M12 9v5M12 17v.5"/>',
  check:'<path d="M20 6 9 17l-5-5"/>',
  checkc:'<circle cx="12" cy="12" r="9"/><path d="M8 12l3 3 5-6"/>',
  arrow:'<path d="M5 12h14M13 6l6 6-6 6"/>',
  grid:'<rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18M3 15h18M9 3v18M15 3v18"/>',
  compass:'<circle cx="12" cy="12" r="9"/><path d="M15.5 8.5 11 11l-2.5 4.5L13 13z"/>',
  mail:'<rect x="3" y="5" width="18" height="14" rx="2"/><path d="M3 7l9 6 9-6"/>',
  globe:'<circle cx="12" cy="12" r="9"/><path d="M3 12h18M12 3a14 14 0 0 1 0 18M12 3a14 14 0 0 0 0 18"/>',
  pin:'<path d="M20 10c0 6-8 12-8 12s-8-6-8-12a8 8 0 0 1 16 0z"/><circle cx="12" cy="10" r="2.6"/>',
  pkg:'<path d="M12 2 21 7v10l-9 5-9-5V7z"/><path d="M3 7l9 5 9-5M12 12v10"/>',
  star:'<path d="M12 2l3 7 7 .5-5.5 4.5 2 7L12 17l-6.5 4 2-7L2 9.5 9 9z"/>',
  flower:'<circle cx="12" cy="12" r="2.4"/><path d="M12 2a3 3 0 0 1 0 6 3 3 0 0 1 0-6zM12 16a3 3 0 0 1 0 6 3 3 0 0 1 0-6zM2 12a3 3 0 0 1 6 0 3 3 0 0 1-6 0zM16 12a3 3 0 0 1 6 0 3 3 0 0 1-6 0z"/>',
  spray:'<rect x="7" y="8" width="9" height="13" rx="2"/><path d="M7 11h9M9 8V5h4v3M16 4h2M16 7h2M19 3v6"/>',
  weed:'<path d="M12 21V9M12 13c-2-1-4-3-4-6 3 0 5 2 5 4M12 11c2-1 4-2 4-5-3 0-5 2-5 4"/>',
  trowel:'<path d="M11 3v8M7 11h8l-4 9z"/>',
  pin2:'<path d="M12 2v14M8 6l4-3 4 3"/><circle cx="12" cy="19" r="2.5"/>'
};
function svg(name,cls){ return '<svg class="ic '+(cls||'')+'" viewBox="0 0 24 24">'+I[name]+'</svg>'; }
function ck(){ return '<span class="ckf"><svg viewBox="0 0 24 24"><path d="M20 6 9 17l-5-5"/></svg></span>'; }

/* helpers */
let D = DATA;
function eur(n){ return Number(n).toLocaleString('fr-FR',{minimumFractionDigits:2,maximumFractionDigits:2})+' €'; }
function m2(n){ return Number(n).toLocaleString('fr-FR',{minimumFractionDigits:n%1?2:0,maximumFractionDigits:2})+' m²'; }
function cap(s){ return s? s.charAt(0).toUpperCase()+s.slice(1):''; }
function nb(n){ return String(n).replace('.',','); }
let SURF = 0;   // (re)calcule dans paint() apres normalize()
let TOTAL = 0;
let __PG = 1;   // compteur de page auto (numerotation dynamique)
function lesRefs(){ const out=[]; D.calepinage.les.forEach(le=>{ const r=(le.leRefs&&le.leRefs.length)?le.leRefs:[le.ref]; r.forEach(x=>out.push({ref:x,largeur:le.largeur,longueur:le.longueur})); }); return out; }

function head(idx,section){
  let dots=''; for(let i=2;i<=TOTAL_PAGES;i++) dots+='<i class="'+(i===idx?'on':'')+'"></i>';
  return `<div class="pg-head">
    <div class="hl"><img class="lg" src="${LOGO}" alt="Verdeko"><span class="hsep"></span><div class="ht">${section}</div></div>
    <div class="hr"><div class="dots">${dots}</div><div class="pn"><b>${String(idx).padStart(2,'0')}</b> / ${TOTAL_PAGES}</div></div>
  </div><div class="pg-rule"></div>`;
}
function foot(){ return `<div class="pg-foot"><div class="fl"><span class="fg">Verdeko</span> — Dossier de pose personnalisé · <span class="fg">www.verdeko.fr</span></div><div class="fr">${D.meta.ref?'Réf. '+D.meta.ref:''}</div></div>`; }
function page(idx,section,body){ __PG++; return `<div class="page">${head(__PG,section)}<div class="pg-body">${body}</div>${foot()}</div>`; }

/* PAGE 1 — COUVERTURE (2/3 contenu blanc + 1/3 visuel gazon) */
function pCover(){
  return `<div class="page cover">
    <div class="cnt">
      <img class="logo" src="${LOGO}" alt="Verdeko">
      <div class="spacer"></div>
      <div class="eyebrow">Dossier de pose personnalisé</div>
      <h1>Guide d'installation<br><span class="g">de votre gazon</span></h1>
      <div class="tline">Gazon synthétique premium · plan de pose optimisé inclus</div>
      <div class="blk"><div class="k">Votre gazon</div><div class="v">${D.produit.nom}<span class="sep">/</span>${m2(SURF)}</div></div>
      <div class="blk client"><div class="k">Préparé pour</div><div class="v">${D.client.nom_complet}</div></div>
      <div class="spacer"></div>
      <div class="foot"><span>Édité le ${D.meta.date}</span>${D.meta.ref?'<span class="dot"></span><span>Réf. '+D.meta.ref+'</span>':''}</div>
      <div class="site">www.verdeko.fr · contact@verdeko.fr</div>
    </div>
    <div class="visual">
      <img src="${D.produit.image_cover}" alt="" onerror="this.style.display='none'">
      <div class="hero-pill">${svg('leaf')}${D.produit.nom}</div>
    </div>
  </div>`;
}

/* PAGE 2 — VOTRE PROJET + SOMMAIRE */
function pProjet(){
  const q=D.questionnaire;
  const chips=[
    ['Forme',cap(D.terrain.forme)],
    ['Sol',cap(q.type_sol)+(q.is_sol_meuble?' · meuble':' · dur')],
    ['Exposition',(q.soleil||'—').replace(/^Entre\s+/i,'').replace(/\s+et\s+/i,'–').replace(/\s*de soleil$/i,'')],
    ['Animaux',q.has_animaux?'Oui':'Non']
  ].map(c=>`<span class="chip"><span class="k">${c[0]}</span>${c[1]}</span>`).join('');
  const toc=[
    ['1','Votre projet','02'],['2','Plan de pose optimisé','03'],['3','Ordre de pose','04'],
    ['4','Matériel & préparation','05'],['5','Préparation du sol','06'],['6','Pose du gazon','07'],
    ['7','Jonctions','08'],['8','Fixation & brossage','09'],['9','Conseils & bonnes pratiques','10'],
    ['10','Entretien & garantie','11'],['11','Accessoires','12']
  ].map(t=>`<div class="ti"><span class="tn">${t[0]}</span><span class="tt">${t[1]}</span><span class="tp">p. ${t[2]}</span></div>`).join('');

  const body=`
    <div class="eyebrow">Votre projet</div>
    <h2 class="h-sec">En un <span class="hl-mark">coup d'œil</span></h2>
    <p class="lead">Ce dossier reprend la configuration validée avec SmartGarden et vous guide, étape par étape, jusqu'à une pose impeccable.</p>

    <div style="display:grid;grid-template-columns:1.55fr 1fr;gap:18px;margin-top:18px;flex:1;align-items:start">
      <div style="display:flex;flex-direction:column;gap:18px">
        <div class="card hero-prod">
          <div class="hp-img"><img src="${D.produit.image_cover}" alt="" onerror="this.style.display='none'"></div>
          <div class="hp-body">
            ${D.produit.recommande?'<div class="brow" style="margin-bottom:9px"><span class="badge gold">'+svg('star')+'Recommandé pour vous</span></div>':''}
            <div class="hp-name">${D.produit.nom}</div>
            <div class="hp-sub">${eur(D.produit.prix_m2)} / m² · ${q.usage||'Premium'}</div>
            <div class="chips">${chips}</div>
          </div>
          <div class="hp-price"><div class="k">Total estimé</div><div class="v">${eur(TOTAL)}</div><div class="kk">${(D.meta && Number(D.meta.total_global)>0) ? m2(SURF)+' · accessoires inclus · livraison offerte' : m2(SURF)+' · livraison offerte'}</div></div>
        </div>
        <div class="grid-4">
          <div class="stat"><div class="v">${m2(SURF)}</div><div class="l">Surface</div></div>
          <div class="stat"><div class="v">${D.calepinage.nb_les}</div><div class="l">Lés</div></div>
          <div class="stat"><div class="v">${D.calepinage.nb_jonctions}</div><div class="l">Jonctions</div></div>
          <div class="stat"><div class="v">${nb(D.calepinage.chutes_percent)}<span class="u">%</span></div><div class="l">Chutes</div></div>
        </div>
        <div class="callout info">${svg('checkc')}<div class="ct"><b>Conseil.</b> Lisez ce dossier en entier avant de commencer, rassemblez le matériel de la page 4, puis suivez les étapes dans l'ordre.</div></div>
      </div>

      <div class="card card-pad" style="align-self:stretch">
        <div class="card-h"><div class="ci">${svg('leaf')}</div><h3>Sommaire</h3></div>
        <div class="toc">${toc}</div>
      </div>
    </div>`;
  return page(2,'Votre projet',body);
}

/* PAGE 3 — PLAN DE POSE */
function samplePlanSVG(){
  var horiz = /horizont/i.test(D.calepinage.orientation||'');
  // L'oeil = point de vue : les brins pointent vers lui.
  // Lés horizontaux -> brins horizontaux -> point de vue sur le côté (gauche). Sinon en bas.
  var ex = horiz ? 44 : 284;
  var ey = horiz ? 212 : 398;
  return `<svg viewBox="0 0 560 430" width="100%" height="100%" preserveAspectRatio="xMidYMid meet" style="display:block">
    <defs><pattern id="grid" width="28" height="28" patternUnits="userSpaceOnUse"><path d="M28 0H0V28" fill="none" stroke="#edeae2" stroke-width="1"/></pattern></defs>
    <rect x="0" y="0" width="560" height="430" fill="#fdfcf9"/>
    <rect x="60" y="34" width="448" height="356" fill="url(#grid)"/>
    <g stroke="#3d7a3d" stroke-width="2" stroke-linejoin="round">
      <rect x="60" y="34" width="150" height="150" fill="#6aac6a" fill-opacity=".55"/>
      <rect x="358" y="34" width="150" height="150" fill="#7bb87b" fill-opacity=".55"/>
      <rect x="60" y="184" width="448" height="120" fill="#5aa05a" fill-opacity=".5"/>
      <rect x="60" y="304" width="448" height="86" fill="#83bd83" fill-opacity=".5"/>
    </g>
    <g stroke="#d9682f" stroke-width="2" stroke-dasharray="7 6"><line x1="60" y1="184" x2="508" y2="184"/><line x1="60" y1="304" x2="508" y2="304"/></g>
    <g font-family="sans-serif" font-weight="700" font-size="13">
      <g><rect x="112" y="100" width="46" height="22" rx="5" fill="#1f2d26"/><text x="135" y="115" fill="#fff" text-anchor="middle">L1a</text></g>
      <g><rect x="410" y="100" width="46" height="22" rx="5" fill="#1f2d26"/><text x="433" y="115" fill="#fff" text-anchor="middle">L1b</text></g>
      <g><rect x="261" y="233" width="40" height="22" rx="5" fill="#1f2d26"/><text x="281" y="248" fill="#fff" text-anchor="middle">L2</text></g>
      <g><rect x="261" y="336" width="40" height="22" rx="5" fill="#1f2d26"/><text x="281" y="351" fill="#fff" text-anchor="middle">L3</text></g>
    </g>
    <g><circle cx="${ex}" cy="${ey}" r="13" fill="#c9a227" stroke="#fff" stroke-width="2.5"/>
      <g transform="translate(${ex},${ey})" stroke="#fff" stroke-width="1.7" fill="none"><path d="M-6 0s2.5-4 6-4 6 4 6 4-2.5 4-6 4-6-4-6-4z"/><circle cx="0" cy="0" r="1.8"/></g></g>
    <g stroke="#9aa39b" stroke-width="1" font-family="sans-serif" font-size="11" fill="#6b7770" font-weight="700">
      <line x1="60" y1="410" x2="508" y2="410"/><text x="284" y="424" text-anchor="middle">12 m</text>
      <line x1="528" y1="34" x2="528" y2="390"/><text x="540" y="215" text-anchor="middle" transform="rotate(90 540 215)">10 m</text></g>
  </svg>`;
}
function pPlan(){
  const realSvg = (D.calepinage.svg && D.calepinage.svg.indexOf('<svg')!==-1);
  const planInner = realSvg ? D.calepinage.svg
    : (window.VERDEKO_PDF_DATA
        ? '<div style="color:var(--muted);font-size:13px;text-align:center;padding:30px">Plan de pose en cours de calcul.</div>'
        : samplePlanSVG());
  const rolls = D.calepinage.les.map(le=>{ const q=le.quantite||1; const s=le.largeur*le.longueur*q;
    return `<tr><td><span class="tag">${le.ref}</span></td><td>${q>1?q+'× ':'1× '}${le.largeur} m × ${Number(le.longueur).toFixed(1)} m</td><td class="r">${m2(s)}</td></tr>`; }).join('');
  const body=`
    <div class="eyebrow">Plan de pose optimisé</div>
    <h2 class="h-sec">Votre <span class="hl-mark">calepinage</span></h2>
    <p class="lead">Découpe optimisée pour réduire les chutes et les jonctions. Respectez le sens des lés : <b>tous les brins orientés dans la même direction</b>.</p>

    <div style="display:grid;grid-template-columns:1.5fr 1fr;gap:18px;margin-top:18px;flex:1;align-items:stretch">
      <div class="card" style="display:flex;flex-direction:column;overflow:hidden">
        <div class="card-pad" style="padding-bottom:0">
          <div class="brow"><span class="badge slate">${svg('compass')}Sens : ${cap(D.calepinage.orientation)}</span><span class="badge green">${svg('eye')}Brins vers votre point de vue</span></div>
        </div>
        <div style="flex:1;margin:14px 20px 20px;border:1.5px solid var(--line);border-radius:14px;overflow:hidden;display:flex;align-items:center;justify-content:center;min-height:0">${planInner}</div>
      </div>
      <div style="display:flex;flex-direction:column;gap:16px">
        <div class="card card-pad" style="flex:1">
          <div class="card-h"><div class="ci">${svg('pkg')}</div><h3>Rouleaux à commander</h3></div>
          <table class="tbl"><thead><tr><th>Réf</th><th>Dimensions</th><th class="r">m²</th></tr></thead><tbody>${rolls}</tbody>
            <tfoot><tr><td colspan="2">Total</td><td class="r">${m2(SURF)}</td></tr></tfoot></table>
        </div>
        <div class="grid-3">
          <div class="stat"><div class="v">${D.calepinage.nb_les}</div><div class="l">Lés</div></div>
          <div class="stat"><div class="v">${D.calepinage.nb_jonctions}</div><div class="l">Jonctions</div></div>
          <div class="stat"><div class="v">${nb(D.calepinage.chutes_percent)}<span class="u">%</span></div><div class="l">Chutes</div></div>
        </div>
        <div class="callout info">${svg('eye')}<div class="ct">La pastille dorée indique <b>votre point de vue principal</b> : c'est vers lui que pointent tous les brins.</div></div>
      </div>
    </div>`;
  return page(3,'Plan de pose optimisé',body);
}

/* PAGE 4 — MATERIEL & PREPARATION */
function pMateriel(){
  const a=D.accessoires;
  const matos=[
    [svg('scissors'),'Cutter + lames neuves','rechange'],
    [svg('ruler'),'Grande règle métallique',''],
    [svg('ruler'),'Mètre ruban + cordeau',''],
    [svg('broom'),'Balai de cantonnier','poils durs'],
    [svg('hammer'),'Maillet caoutchouc',''],
    [svg('tool'),D.questionnaire.is_sol_meuble?'Plaque vibrante':'Aspirateur / souffleur','location'],
    [svg('trowel'),'Brouette, pelle, râteau',''],
    [svg('shield'),'Gants de protection','']
  ].map(m=>`<div class="tool-line">${m[0]}<span class="tl-name">${m[1]}</span>${m[2]?'<span class="tl-tag">'+m[2]+'</span>':''}</div>`).join('');
  const fourn=[
    [svg('grid'),D.produit.nom, m2(SURF)+' — '+D.calepinage.nb_les+' lés à découper'],
    [svg('layers'),'Géotextile anti-repousse', a.geotextile.m2+' m² ('+a.geotextile.rouleaux+' rouleaux de 25 m)'],
    [svg('tool'),'Bande de jonction + colle', a.bande_jonction.ml+' ml — '+a.bande_jonction.unites+' jonction(s)'],
    [svg('pin2'),'Pointes / grappins', a.pointes.boites+' boîte(s) — fixation du périmètre']
  ].map(f=>`<div class="row" style="padding:11px 14px"><span class="ri">${f[0]}</span><div class="rt"><div class="a">${f[1]}</div><div class="b">${f[2]}</div></div></div>`).join('');
  const body=`

   91 usage · 92 projet_pro · 93 sport · 94 animaux · 95 soleil. Aspect (96) ignoré (placeholders). */
function projectTips(){
  const q=D.questionnaire;
  const u=(q.usage||'').toLowerCase();
  const p=((q.projet_pro||'')+' '+(q.sous_projet||'')).toLowerCase();
  const sp=(q.sport||'').toLowerCase();
  const s=(q.soleil||'').toLowerCase();
  const t=[];
  // usage principal (champ 91)
  if(u.indexOf('piscine')>-1) t.push([svg('droplet'),'Bord de piscine','Gazon résistant au chlore et au sel. Soignez le drainage et la fixation près des margelles.']);
  if(u.indexOf('balcon')>-1||u.indexOf('terrasse')>-1) t.push([svg('layers'),'Terrasse & balcon','Pas de décaissement : posez sur support propre, soignez l\'écoulement de l\'eau et fixez bien le périmètre.']);
  if(u.indexOf('passage')>-1||u.indexOf('intensif')>-1||u.indexOf('jeux')>-1) t.push([svg('tool'),'Passage intensif & jeux','Brossage plus fréquent et lestage en sable de silice pour préserver la tenue des brins.']);
  if(u.indexOf('naturel')>-1) t.push([svg('eye'),'Effet naturel','Brins multi-tons et fil frisé : un brossage régulier conserve l\'effet « vraie pelouse ».']);
  if(u.indexOf('jardin')>-1) t.push([svg('flower'),'Jardin & vie quotidienne','Entretien minimal : brossage saisonnier et rinçage occasionnel suffisent toute l\'année.']);
  // pro / sport (champs 92 / 93)
  if(sp.indexOf('putting')>-1||p.indexOf('golf')>-1) t.push([svg('star'),'Putting green','Sable de lestage pour la vitesse de roulement, aspect ras, brossage régulier.']);
  else if(sp.indexOf('padel')>-1||sp.indexOf('tennis')>-1) t.push([svg('tool'),'Padel / Tennis','Lestage sable pour le rebond et la stabilité des lignes. Brossage fréquent.']);
  else if(sp.indexOf('multisport')>-1) t.push([svg('shield'),'Multisport','Fibres robustes : lestage et brossage réguliers pour encaisser le passage.']);
  if(p.indexOf('restaurant')>-1||p.indexOf('hôtel')>-1||p.indexOf('hotel')>-1) t.push([svg('star'),'Lieu public','Passage soutenu : brossage renforcé et nettoyage fréquent pour garder l\'aspect neuf.']);
  if(p.indexOf('école')>-1||p.indexOf('ecole')>-1||p.indexOf('aire de jeux')>-1) t.push([svg('shield'),'Aire de jeux','Sous-couche amortissante conseillée et nettoyage régulier de la zone.']);
  if(p.indexOf('événementiel')>-1||p.indexOf('evenement')>-1||p.indexOf('stand')>-1) t.push([svg('pkg'),'Événementiel','Pose temporaire : fixation légère et réutilisable, stockage à plat.']);
  // animaux (champ 94)
  if(q.has_animaux) t.push([svg('paw'),'Vous avez des animaux','Zone toilette dédiée, rinçage 2 à 3 fois/semaine, nettoyant enzymatique. Accès 48 h après la pose.']);
  // soleil (champ 95)
  if(s.indexOf('plein soleil')>-1) t.push([svg('sun'),'Plein soleil','Fibres traitées anti-UV (garantie 15 ans). Par forte chaleur, un rinçage rafraîchit la surface.']);
  else if(s.indexOf('ombre')>-1) t.push([svg('droplet'),'Zone ombragée','Surveillez mousses et humidité : brossez les feuilles et nettoyez un peu plus souvent.']);
  if(!t.length) t.push([svg('checkc'),'Conseil clé','Respectez le sens des brins et brossez après la pose pour un rendu optimal.']);
  return t.slice(0,4);
}

/* ── CONTEXTE & PAGES D'USAGE ──────────────────────────────
   Flags lus en souple sur l'entry. Famille produit via produit.id (stable),
   fallback nom, defaut 'standard'. Sert aux pages d'usage conditionnelles. */
function ctx(){
  var q  = D.questionnaire || {};
  var u  = (q.usage||'').toLowerCase();
  var pr = ((q.projet_pro||'')+' '+(q.sous_projet||'')).toLowerCase();
  var sp = (q.sport||'').toLowerCase();
  var id = String((D.produit&&D.produit.id)||'');
  var nm = ((D.produit&&D.produit.nom)||'').toLowerCase();
  var famille = 'standard';
  if(['29413','12471'].indexOf(id)>-1 || /green|golf|putting/.test(nm)) famille='putting';
  else if(id==='30364' || /padel|smash/.test(nm)) famille='padel';
  else if(['30362','30717'].indexOf(id)>-1 || /arena|activ|multi/.test(nm)) famille='multisport';
  if(famille==='standard'){
    if(/putting|golf/.test(sp)) famille='putting';
    else if(/padel|tennis/.test(sp)) famille='padel';
    else if(/multisport|foot/.test(sp)) famille='multisport';
  }
  return {
    famille: famille,
    sport: famille!=='standard',
    piscine: u.indexOf('piscine')>-1,
    terrasse: u.indexOf('terrasse')>-1 || u.indexOf('balcon')>-1,
    passage: u.indexOf('passage')>-1 || u.indexOf('intensif')>-1 || u.indexOf('jeux')>-1,
    aireJeux: pr.indexOf('ecole')>-1 || pr.indexOf('école')>-1 || pr.indexOf('aire de jeux')>-1,
    lieuPublic: pr.indexOf('restaurant')>-1 || pr.indexOf('hotel')>-1 || pr.indexOf('hôtel')>-1,
    event: pr.indexOf('venement')>-1 || pr.indexOf('stand')>-1
  };
}

/* Forme du bassin deduite de l'obstacle dessine (Konva). Detection defensive
   sur plusieurs structures possibles + fallback rond. A affiner sur un vrai payload. */
function poolShape(){
  var obs = (D.terrain && Array.isArray(D.terrain.obstacles)) ? D.terrain.obstacles : [];
  if(!obs.length) return 'rond';
  var o = obs[0] || {};
  var t = ((o.type||o.shape||o.kind||o.forme||'')+'').toLowerCase();
  if(/circle|cercle|rond|ellipse|round|oval/.test(t)) return 'rond';
  if(/rect|carre|square|polygon|poly/.test(t)) return 'carre';
  if(o.radius!=null || o.rayon!=null || o.r!=null) return 'rond';
  if((o.points && o.points.length) || (o.width!=null && o.height!=null) || (o.w!=null && o.h!=null)) return 'carre';
  return 'rond';
}

/* selection de LA page d'usage (une seule par projet, par priorite) */
function pickUsage(c){
  var q = D.questionnaire||{};
  var sp = (q.sport||'').toLowerCase();
  var u  = (q.usage||'').toLowerCase();
  if(c.famille==='padel' || /padel|tennis/.test(sp)) return pUsagePadel;
  if(/foot|football/.test(sp) || /foot|football/.test(u)) return pUsageFoot;
  if(c.famille==='putting' || /putting|golf/.test(sp)) return pUsageGolf;
  if(c.famille==='multisport') return pUsageIntensif;
  if(c.piscine) return pUsagePiscine;
  if(c.aireJeux || c.passage) return pUsageIntensif;
  if(c.terrasse) return pUsageTerrasse;
  if(c.lieuPublic || c.event) return pUsagePro;
  return null;
}

/* ====================================================================
   MONTAGE (PROD)
   window.VERDEKO_PDF_DATA est injecté par le service avant </head>.
   En l'absence d'injection, le DATA d'exemple sert d'aperçu autonome.
   ==================================================================== */
function normalize(){
  D.meta = (D.meta && typeof D.meta==='object') ? D.meta : {};
  if(!D.meta.date) D.meta.date = new Date().toLocaleDateString('fr-FR');
  if(D.meta.ref==null) D.meta.ref='';
  D.meta.total_global = parseFloat(D.meta.total_global || 0) || 0;
  D.meta.total_accessoires = parseFloat(D.meta.total_accessoires || 0) || 0;
  function bad(v){ return v==null || v==='undefined' || v==='null' || (''+v).trim()===''; }
  D.client = D.client || {};
  ['prenom','nom','nom_complet','email','telephone'].forEach(function(k){ if(bad(D.client[k])) D.client[k]=''; });
  if(!D.client.nom_complet) D.client.nom_complet = ((D.client.prenom||'')+' '+(D.client.nom||'')).trim() || 'Client';
  D.terrain = D.terrain || {};
  D.terrain.dimensions = D.terrain.dimensions || {};
  if(!D.terrain.forme) D.terrain.forme = 'Personnalisee';
  D.produit = D.produit || {};
  if(bad(D.produit.nom)) D.produit.nom = 'Gazon synthétique';
  D.produit.prix_m2 = parseFloat(D.produit.prix_m2 || D.produit.prix || 0) || 0;
  D.produit.image = D.produit.image || '';
  if(!D.produit.image_cover) D.produit.image_cover = D.produit.image || '';
  D.calepinage = D.calepinage || {};
  D.calepinage.les = Array.isArray(D.calepinage.les) ? D.calepinage.les : [];
  if(!D.calepinage.orientation) D.calepinage.orientation = 'horizontal';
  D.calepinage.chutes_percent = D.calepinage.chutes_percent || 0;
  D.calepinage.nb_jonctions = (D.calepinage.nb_jonctions!=null) ? D.calepinage.nb_jonctions : Math.max(0, D.calepinage.les.length-1);
  D.calepinage.nb_les = D.calepinage.nb_les || D.calepinage.les.reduce((n,le)=>n+(parseInt(le.quantite||1)),0) || D.calepinage.les.length;
  D.questionnaire = D.questionnaire || {};
  D.accessoires = D.accessoires || {};
  var _surf = D.terrain.surface_brute || D.terrain.surface_nette || 0;
  var _nj = D.calepinage.nb_jonctions || 0;
  var g = D.accessoires.geotextile = D.accessoires.geotextile || {};
  if(!g.m2) g.m2 = _surf ? Math.ceil(_surf*1.15) : 0;
  if(!g.rouleaux) g.rouleaux = g.m2 ? Math.ceil(g.m2/25) : 0;
  if(!g.description) g.description = 'Anti-repousse, drainage';
  var b = D.accessoires.bande_jonction = D.accessoires.bande_jonction || {};
  if(!b.unites) b.unites = _nj;
  if(!b.ml) b.ml = _nj ? Math.ceil(_nj*10) : 0;
  if(!b.description) b.description = 'Pour les jonctions entre les';
  var p = D.accessoires.pointes = D.accessoires.pointes || {};
  if(!p.boites) p.boites = _surf ? Math.max(1, Math.ceil(Math.sqrt(_surf)*8/170)) : 0;
  if(!p.description) p.description = 'Fixation peripherique';
  if(D.accessoires.enzyme===undefined) D.accessoires.enzyme = (D.questionnaire.has_animaux && _surf) ? {bouteilles:Math.ceil(_surf/50),description:'Neutralise les odeurs'} : null;
}
function paint(){
  if (window.VERDEKO_PDF_DATA) D = window.VERDEKO_PDF_DATA;
  try{
    normalize();
    SURF = D.terrain.surface_brute || D.terrain.surface_nette || 0;
    TOTAL = (D.meta && Number(D.meta.total_global) > 0) ? Number(D.meta.total_global) : SURF * D.produit.prix_m2;
    __PG = 1;
    var c = ctx();
    var pagesContenu = [pProjet,pPlan,pOrdrePose,pMateriel,pSol,pPose,pJonctions,pFixation,pConseils,pEntretien,pAccessoires];
    var up = pickUsage(c);
    if(up) pagesContenu.push(up);
    pagesContenu.push(pRecap);
    TOTAL_PAGES = pagesContenu.length + 2;
    document.getElementById('app').innerHTML =
      pCover() + pagesContenu.map(function(fn){ return fn(); }).join('') + pEnd();
  }catch(e){
    console.error('[Verdeko PDF] Erreur de rendu:', (e && e.message) || e, e && e.stack);
    document.getElementById('app').innerHTML =
      '<div class="page"><div class="pg-body" style="display:flex;align-items:center;justify-content:center;text-align:center">'+
      '<div><div style="font-size:20px;font-weight:700;color:#23454f">Guide en cours de preparation</div>'+
      '<div style="color:#6b7770;margin-top:10px;font-size:13px;max-width:420px">Une information de votre projet est manquante. Notre equipe vous recontacte rapidement.</div></div>'+
      '</div></div>';
  }
  window.__verdekoReady = true;
}
paint();

</script>
